# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.9.3
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.32.1

clusterName: kubernetes
endpoint: https://172.17.17.10:6443

clusterPodNets:
  - "172.18.0.0/16"
clusterSvcNets:
  - "172.19.0.0/16"

additionalApiServerCertSans: &sans
  - "172.17.17.10"
  - "clustervip.talos1.4909.arachne.us"
  - "127.0.0.1"
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "talos1-controlplane1"
    ipAddress: "172.17.17.11"
    installDiskSelector:
      serial: "sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:69:5f:34"
        dhcp: false
        addresses:
          - "172.17.17.11/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "172.17.17.254"
        mtu: 1500
        vip:
          ip: "172.17.17.10"
  - hostname: "talos1-controlplane2"
    ipAddress: "172.17.17.12"
    installDiskSelector:
      serial: "sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:95:00:a9"
        dhcp: false
        addresses:
          - "172.17.17.12/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "172.17.17.254"
        mtu: 1500
        vip:
          ip: "172.17.17.10"
  - hostname: "talos1-controlplane3"
    ipAddress: "172.17.17.13"
    installDiskSelector:
      serial: "sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:95:ae:6b"
        dhcp: false
        addresses:
          - "172.17.17.13/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "172.17.17.254"
        mtu: 1500
        vip:
          ip: "172.17.17.10"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"

